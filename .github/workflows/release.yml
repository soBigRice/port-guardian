name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            bundles: app,dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Use official crates.io registry in CI
        shell: bash
        run: |
          if [ -f src-tauri/.cargo/config.toml ]; then
            mv src-tauri/.cargo/config.toml src-tauri/.cargo/config.local.toml
          fi
          mkdir -p src-tauri/.cargo
          cat > src-tauri/.cargo/config.toml <<'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing build version to ${VERSION}"
          node -e '
            const fs = require("fs");
            const version = process.argv[1];
            const pkgPath = "package.json";
            const tauriPath = "src-tauri/tauri.conf.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");
            const tauri = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
            tauri.version = version;
            fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + "\n");
          ' "$VERSION"

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing repository secret TAURI_SIGNING_PRIVATE_KEY. Tauri updater artifacts require a private key matching the pubkey in src-tauri/tauri.conf.json."
            exit 1
          fi

          node <<'NODE'
          const fs = require("fs");

          const key = process.env.TAURI_SIGNING_PRIVATE_KEY ?? "";
          const tauriConfig = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const pubkey = tauriConfig?.plugins?.updater?.pubkey ?? "";

          const fail = (message) => {
            console.error(`::error::${message}`);
            process.exit(1);
          };

          const decodeBase64Utf8 = (value, label) => {
            if (!value) {
              fail(`Missing ${label}.`);
            }

            // Tauri CLI 需要 base64 编码后的 minisign/rsign key 文件内容，不能传原始多行文件或裸 key 行。
            if (value.includes("untrusted comment:") || value.includes("trusted comment:")) {
              fail(`Invalid ${label}. Encode the whole key file as one base64 line instead of pasting the raw comment/key lines.`);
            }

            // key 必须是单行；空格、Tab、换行都会导致 Tauri 在 updater 签名阶段解码失败。
            if (/\s/.test(value)) {
              fail(`Invalid ${label}. It must be a single base64 line with no spaces, tabs, or line breaks.`);
            }

            if (!/^[A-Za-z0-9+/=]+$/.test(value)) {
              fail(`Invalid ${label}. It contains characters outside the standard base64 alphabet.`);
            }

            const decoded = Buffer.from(value, "base64");
            const text = decoded.toString("utf8");

            if (Buffer.from(text, "utf8").compare(decoded) !== 0) {
              fail(`Invalid ${label}. It must decode to UTF-8 key file text, not raw minisign binary key bytes.`);
            }

            return text;
          };

          const privateKeyText = decodeBase64Utf8(key, "repository secret TAURI_SIGNING_PRIVATE_KEY");
          if (!/secret key/i.test(privateKeyText)) {
            fail("Invalid repository secret TAURI_SIGNING_PRIVATE_KEY. It must decode to a private secret key file, not the public .pub key.");
          }

          const publicKeyText = decodeBase64Utf8(pubkey, "src-tauri/tauri.conf.json plugins.updater.pubkey");
          if (!/public key/i.test(publicKeyText)) {
            fail("Invalid src-tauri/tauri.conf.json plugins.updater.pubkey. It must decode to the public .pub key file text.");
          }
          NODE

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          CHANGELOG_FILE="${{ github.workspace }}/CHANGELOG.md"
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "body=See the assets below to download and install." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BODY=$(node -e '
            const fs = require("fs");
            const version = process.argv[1];
            const changelog = fs.readFileSync(process.argv[2], "utf8");
            const pattern = new RegExp(`^## \\[${version}\\][\\s\\S]*?(?=^## \\[|$)`, "m");
            const match = changelog.match(pattern);
            if (match) {
              console.log(match[0].trim());
            } else {
              console.log("See the assets below to download and install.");
            }
          ' "$VERSION" "$CHANGELOG_FILE")
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Port Guardian ${{ github.ref_name }}"
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

  publish-release:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish release after assets are uploaded
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          headers=(
            -H "Authorization: Bearer ${GITHUB_TOKEN}"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          release_json="$(
            curl -fsSL "${headers[@]}" "${api}/releases?per_page=100" |
              GITHUB_REF_NAME="${GITHUB_REF_NAME}" node -e '
                const fs = require("fs");
                const releases = JSON.parse(fs.readFileSync(0, "utf8"));
                const release = releases.find((item) => item.tag_name === process.env.GITHUB_REF_NAME);
                if (!release) {
                  console.error(`Cannot find draft release for ${process.env.GITHUB_REF_NAME}.`);
                  process.exit(1);
                }
                console.log(JSON.stringify(release));
              '
          )"
          release_id="$(node -e 'const fs = require("fs"); const release = JSON.parse(fs.readFileSync(0, "utf8")); if (!release.id) process.exit(1); console.log(release.id);' <<< "$release_json")"

          assets_json="$(curl -fsSL "${headers[@]}" "${api}/releases/${release_id}/assets?per_page=100")"
          node -e '
            const fs = require("fs");
            const assets = JSON.parse(fs.readFileSync(0, "utf8"));
            const names = assets.map((asset) => asset.name);
            const hasLatest = names.includes("latest.json");
            const hasMacInstaller = names.some((name) => name.endsWith(".dmg"));
            const hasWindowsInstaller = names.some((name) => name.endsWith(".exe"));
            if (!hasLatest || !hasMacInstaller || !hasWindowsInstaller) {
              console.error("Release assets are incomplete:", names.join(", "));
              process.exit(1);
            }
          ' <<< "$assets_json"

          # 从 CHANGELOG.md 提取当前版本的更新日志作为 Release body
          VERSION="${GITHUB_REF_NAME#v}"
          CHANGELOG_FILE="${{ github.workspace }}/CHANGELOG.md"
          if [ ! -f "$CHANGELOG_FILE" ]; then
            body="See the assets below to download and install."
          else
            body=$(node -e '
              const fs = require("fs");
              const version = process.argv[1];
              const changelog = fs.readFileSync(process.argv[2], "utf8");
              const pattern = new RegExp(`^## \\[${version}\\][\\s\\S]*?(?=^## \\[|$)`, "m");
              const match = changelog.match(pattern);
              if (match) {
                console.log(match[0].trim());
              } else {
                console.log("See the assets below to download and install.");
              }
            ' "$VERSION" "$CHANGELOG_FILE")
          fi

          curl -fsSL -X PATCH "${headers[@]}" \
            -H "Content-Type: application/json" \
            -d "$(node -e 'console.log(JSON.stringify({draft:false, prerelease:false, body:process.argv[1]}))' "$body")" \
            "${api}/releases/${release_id}" >/dev/null

          echo "Published release ${GITHUB_REF_NAME}."
